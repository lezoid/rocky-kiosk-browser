<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Waiting</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
    }
    .card {
      text-align: center;
      padding: 40px 48px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.7);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      max-width: 720px;
    }
    h1 {
      font-size: 40px;
      margin: 0 0 12px;
    }
    p {
      font-size: 20px;
      margin: 0;
      opacity: 0.9;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>接続待機中...</h1>
    <p>Waiting for connection...</p>
    <p>ネットワーク疎通を確認しています</p>
    <p>Checking network connectivity</p>
  </div>
</body>
</html>
